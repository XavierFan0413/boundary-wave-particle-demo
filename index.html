<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>境符「波と粒の境界」</title>
  <style>
    :root {
      --bg: #0e0b14;
      --panel: rgba(26, 20, 38, 0.88);
      --panel-border: rgba(200, 170, 255, 0.18);
      --text: #f4ecff;
      --muted: #c9b7e9;
      --accent: #d8a8ff;
      --accent-2: #9ecbff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at top, #1a1330 0%, #0e0b14 45%, #09070d 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .stats,
    .top-actions {
      background: rgba(26, 20, 38, 0.78);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      pointer-events: auto;
    }

    .title {
      max-width: 60%;
      padding: 0;
      background: none;
      border: 0;
      border-radius: 0;
      backdrop-filter: none;
      box-shadow: none;
    }

    .title h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .stats {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      pointer-events: auto;
    }

    .stats {
      text-align: right;
      min-width: 96px;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      padding: 6px;
    }

    .lang-btn,
    .play-btn {
      border: none;
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      background: linear-gradient(180deg, rgba(220, 170, 255, 0.22), rgba(120, 90, 180, 0.22));
      border: 1px solid rgba(220, 170, 255, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .lang-btn {
      min-width: 42px;
    }

    .play-btn {
      min-width: 56px;
    }

    .play-btn.active {
      background: linear-gradient(180deg, rgba(160, 232, 255, 0.32), rgba(110, 160, 255, 0.26));
      border-color: rgba(160, 220, 255, 0.38);
    }

    .controls {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 20;
      background: rgba(26, 20, 38, 0.74);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 12px 14px 14px 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.30);
      transition: transform 220ms ease;
      will-change: transform;
    }

    .controls.collapsed {
      transform: translateY(calc(100% - 54px));
    }

    .controls-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 40px;
    }

    .controls-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.2px;
    }

    .controls-head-left {
      min-width: 0;
    }

    .controls-content {
      margin-top: 12px;
      max-height: 1000px;
      overflow: hidden;
      opacity: 1;
      transition: opacity 180ms ease, max-height 180ms ease, margin-top 180ms ease;
    }

    .controls.collapsed .controls-content {
      opacity: 0;
      max-height: 0;
      margin-top: 0;
      pointer-events: none;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(180deg, rgba(220, 170, 255, 0.24), rgba(120, 90, 180, 0.24));
      color: var(--text);
      border: 1px solid rgba(220, 170, 255, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .button-row button {
      flex: 1 1 150px;
    }

    .toggle-btn {
      flex: 0 0 auto;
      padding: 9px 12px;
      font-size: 12px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(200, 160, 255, 0.17), rgba(90, 72, 135, 0.21));
    }

    button:active {
      transform: scale(0.985);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
    }

    .control {
      min-width: 0;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .label-left {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .value {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
      }

      .title {
        max-width: none;
      }

      .right-col {
        align-items: stretch;
      }

      .stats {
        text-align: left;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .button-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <div class="topbar">
      <div class="title">
        <h1 id="titleText">境符「波と粒の境界」</h1>
      </div>

      <div class="right-col">
        <div class="top-actions">
          <button class="lang-btn" id="langBtn">中</button>
          <button class="play-btn" id="playBtn" type="button">Play</button>
        </div>
        <div class="stats" id="stats"></div>
      </div>
    </div>

    <div class="controls" id="controlsPanel">
      <div class="controls-header">
        <div class="controls-head-left">
          <div class="controls-title" id="controlsTitle">Controls</div>
        </div>
        <button class="toggle-btn" id="toggleControlsBtn">Hide Controls</button>
      </div>

      <div class="controls-content">
        <div class="button-row">
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
          <button id="dreamyBtn">Dreamy</button>
          <button id="calmBtn">Calm</button>
        </div>

        <div class="grid">
          <div class="control">
            <label>
              <span class="label-left">
                <span id="waysLabel">ways</span>
              </span>
              <span class="value" id="waysVal"></span>
            </label>
            <input id="ways" type="range" min="1" max="12" step="1" value="5">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="alphaLabel">alpha</span>
              </span>
              <span class="value" id="alphaVal"></span>
            </label>
            <input id="alpha" type="range" min="0" max="1000" step="1" value="500">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="emitLabel">emit</span>
              </span>
              <span class="value" id="emitVal"></span>
            </label>
            <input id="emitEvery" type="range" min="1" max="8" step="1" value="2">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="bulletSpeedLabel">bullet speed</span>
              </span>
              <span class="value" id="bulletSpeedVal"></span>
            </label>
            <input id="bulletSpeed" type="range" min="0.05" max="2.50" step="0.01" value="0.75">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="spawnLabel">spawn</span>
              </span>
              <span class="value" id="spawnVal"></span>
            </label>
            <input id="spawnRadius" type="range" min="10" max="80" step="1" value="24">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="lifetimeLabel">lifetime</span>
              </span>
              <span class="value" id="lifetimeVal"></span>
            </label>
            <input id="lifetime" type="range" min="80" max="420" step="5" value="220">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const I18N = {
      en: {
        title: "境符「波と粒の境界」",
        controlsTitle: "Controls",
        hideControls: "Hide Controls",
        showControls: "Show Controls",
        pause: "Pause",
        resume: "Resume",
        reset: "Reset",
        dreamy: "Dreamy",
        calm: "Calm",
        ways: "streams",
        alpha: "twist",
        emit: "emit gap",
        bulletSpeed: "speed",
        spawn: "ring size",
        lifetime: "lifetime",
        statsBullets: "bullets",
        langButton: "中",
        playButton: "Play"
      },
      zh: {
        title: "境符「波与粒的境界」",
        controlsTitle: "控制面板",
        hideControls: "收起面板",
        showControls: "展开面板",
        pause: "暂停",
        resume: "继续",
        reset: "重置",
        dreamy: "梦幻",
        calm: "平缓",
        ways: "分流",
        alpha: "旋转速率",
        emit: "发射间隔",
        bulletSpeed: "子弹速度",
        spawn: "发射半径",
        lifetime: "存活帧",
        statsBullets: "弹幕数",
        langButton: "EN",
        playButton: "游玩"
      }
    };

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const titleText = document.getElementById("titleText");
    const controlsTitle = document.getElementById("controlsTitle");
    const statsEl = document.getElementById("stats");

    const langBtn = document.getElementById("langBtn");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const dreamyBtn = document.getElementById("dreamyBtn");
    const calmBtn = document.getElementById("calmBtn");
    const controlsPanel = document.getElementById("controlsPanel");
    const toggleControlsBtn = document.getElementById("toggleControlsBtn");

    const controls = {
      ways: document.getElementById("ways"),
      alpha: document.getElementById("alpha"),
      emitEvery: document.getElementById("emitEvery"),
      bulletSpeed: document.getElementById("bulletSpeed"),
      spawnRadius: document.getElementById("spawnRadius"),
      lifetime: document.getElementById("lifetime"),
    };

    const values = {
      ways: document.getElementById("waysVal"),
      alpha: document.getElementById("alphaVal"),
      emitEvery: document.getElementById("emitVal"),
      bulletSpeed: document.getElementById("bulletSpeedVal"),
      spawnRadius: document.getElementById("spawnVal"),
      lifetime: document.getElementById("lifetimeVal"),
    };

    const labels = {
      ways: document.getElementById("waysLabel"),
      alpha: document.getElementById("alphaLabel"),
      emitEvery: document.getElementById("emitLabel"),
      bulletSpeed: document.getElementById("bulletSpeedLabel"),
      spawnRadius: document.getElementById("spawnLabel"),
      lifetime: document.getElementById("lifetimeLabel"),
    };

    const ALPHA_MIN = 0.0000002;
    const ALPHA_MAX = 0.0045000;

    const state = {
      frame: 0,
      phase: 0,
      bullets: [],
      paused: false,
      dpr: Math.max(1, Math.min(window.devicePixelRatio || 1, 2)),
      width: 0,
      height: 0,
      cx: 0,
      cy: 0,
      playMode: false,
      player: {
        x: 0,
        y: 0,
        radius: 7,
        active: false,
        invulnerableUntil: 0,
        hiddenUntil: 0,
        flashFrames: 0,
        rippleFrames: 0,
      },
      controlsCollapsed: false,
      lang: "en"
    };

    function t(key) {
      return I18N[state.lang][key];
    }

    function alphaFromSlider(raw) {
      const x = Number(raw) / 1000;
      return ALPHA_MIN + (ALPHA_MAX - ALPHA_MIN) * Math.pow(x, 3);
    }

    function sliderFromAlpha(alpha) {
      const clamped = Math.max(ALPHA_MIN, Math.min(ALPHA_MAX, alpha));
      const x = Math.pow((clamped - ALPHA_MIN) / (ALPHA_MAX - ALPHA_MIN), 1 / 3);
      return Math.round(x * 1000);
    }

    function formatAlpha(v) {
      if (v < 0.00001) return v.toFixed(7);
      return v.toFixed(6);
    }

    function params() {
      return {
        ways: parseInt(controls.ways.value, 10),
        alpha: alphaFromSlider(controls.alpha.value),
        emitEvery: parseInt(controls.emitEvery.value, 10),
        bulletSpeed: parseFloat(controls.bulletSpeed.value),
        spawnRadius: parseFloat(controls.spawnRadius.value),
        lifetime: parseInt(controls.lifetime.value, 10),
      };
    }

    function syncLabels() {
      const p = params();
      values.ways.textContent = p.ways;
      values.alpha.textContent = formatAlpha(p.alpha);
      values.emitEvery.textContent = p.emitEvery;
      values.bulletSpeed.textContent = p.bulletSpeed.toFixed(2);
      values.spawnRadius.textContent = p.spawnRadius.toFixed(0);
      values.lifetime.textContent = p.lifetime;
    }

    function applyLanguage() {
      titleText.textContent = t("title");
      controlsTitle.textContent = t("controlsTitle");
      pauseBtn.textContent = state.paused ? t("resume") : t("pause");
      resetBtn.textContent = t("reset");
      dreamyBtn.textContent = t("dreamy");
      calmBtn.textContent = t("calm");
      toggleControlsBtn.textContent = state.controlsCollapsed ? t("showControls") : t("hideControls");
      langBtn.textContent = t("langButton");
      playBtn.textContent = t("playButton");

      labels.ways.textContent = t("ways");
      labels.alpha.textContent = t("alpha");
      labels.emitEvery.textContent = t("emit");
      labels.bulletSpeed.textContent = t("bulletSpeed");
      labels.spawnRadius.textContent = t("spawn");
      labels.lifetime.textContent = t("lifetime");
    }

    function resize() {
      state.dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const w = window.innerWidth;
      const h = window.innerHeight;

      canvas.width = Math.floor(w * state.dpr);
      canvas.height = Math.floor(h * state.dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";

      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

      state.width = w;
      state.height = h;
      state.cx = w * 0.5;
      state.cy = h * 0.44;
      state.player.x = Math.max(0, Math.min(state.width, state.player.x));
      state.player.y = Math.max(0, Math.min(state.height, state.player.y));
    }

    function resetPattern() {
      state.frame = 0;
      state.phase = 0;
      state.bullets = [];
    }

    function setControlsCollapsed(collapsed) {
      state.controlsCollapsed = collapsed;
      controlsPanel.classList.toggle("collapsed", collapsed);
      toggleControlsBtn.textContent = collapsed ? t("showControls") : t("hideControls");
    }

    function setPlayMode(enabled) {
      state.playMode = enabled;
      playBtn.classList.toggle("active", enabled);
      playBtn.setAttribute("aria-pressed", enabled ? "true" : "false");

      if (!enabled) {
        state.player.active = false;
        state.player.flashFrames = 0;
        state.player.rippleFrames = 0;
        return;
      }

      state.player.x = state.width * 0.5;
      state.player.y = state.height * 0.72;
      state.player.active = true;
      state.player.invulnerableUntil = performance.now() + 500;
      state.player.hiddenUntil = 0;
      state.player.flashFrames = 0;
      state.player.rippleFrames = 0;
    }

    function updatePlayerFromPointer(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      state.player.x = Math.max(0, Math.min(state.width, x));
      state.player.y = Math.max(0, Math.min(state.height, y));
      state.player.active = true;
    }

    function onPlayPointerMove(e) {
      if (!state.playMode) return;
      updatePlayerFromPointer(e.clientX, e.clientY);
      if (e.pointerType === "touch") {
        e.preventDefault();
      }
    }

    function onPlayPointerLeave(e) {
      if (!state.playMode) return;
      if (e.pointerType === "mouse") {
        state.player.active = false;
      }
    }

    function onPlayPointerEnd(e) {
      if (!state.playMode) return;
      if (e.pointerType !== "mouse") {
        state.player.active = false;
      }
    }

    function triggerPlayerHit() {
      const now = performance.now();
      state.player.flashFrames = 10;
      state.player.rippleFrames = 16;
      state.player.hiddenUntil = now + 220;
      state.player.invulnerableUntil = now + 900;
    }

    function updatePlayModeState() {
      if (!state.playMode) return;

      if (state.player.flashFrames > 0) state.player.flashFrames -= 1;
      if (state.player.rippleFrames > 0) state.player.rippleFrames -= 1;

      if (!state.player.active) return;
      if (performance.now() < state.player.invulnerableUntil) return;

      const hitRadius = state.player.radius + 2.8;
      const hitRadiusSq = hitRadius * hitRadius;

      for (const b of state.bullets) {
        const dx = b.x - state.player.x;
        const dy = b.y - state.player.y;
        if (dx * dx + dy * dy <= hitRadiusSq) {
          triggerPlayerHit();
          return;
        }
      }
    }

    function dreamyPreset() {
      controls.ways.value = "8";
      controls.alpha.value = String(sliderFromAlpha(0.0032));
      controls.emitEvery.value = "1";
      controls.bulletSpeed.value = "0.70";
      controls.spawnRadius.value = "28";
      controls.lifetime.value = "260";
      syncLabels();
      resetPattern();
    }

    function calmPreset() {
      controls.ways.value = "5";
      controls.alpha.value = String(sliderFromAlpha(0.000030));
      controls.emitEvery.value = "2";
      controls.bulletSpeed.value = "0.38";
      controls.spawnRadius.value = "24";
      controls.lifetime.value = "240";
      syncLabels();
      resetPattern();
    }

    function emitBullets() {
      const p = params();
      for (let i = 0; i < p.ways; i++) {
        const theta = state.phase + i * (Math.PI * 2 / p.ways);
        const x = state.cx + p.spawnRadius * Math.cos(theta);
        const y = state.cy + p.spawnRadius * Math.sin(theta);
        const vx = p.bulletSpeed * Math.cos(theta);
        const vy = p.bulletSpeed * Math.sin(theta);

        state.bullets.push({
          x,
          y,
          vx,
          vy,
          age: 0,
        });
      }
    }

    function step() {
      const p = params();

      state.phase += state.frame * p.alpha;

      if (state.frame % p.emitEvery === 0) {
        emitBullets();
      }

      const next = [];
      for (const b of state.bullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.age += 1;

        if (
          b.age <= p.lifetime &&
          b.x > -80 &&
          b.x < state.width + 80 &&
          b.y > -80 &&
          b.y < state.height + 80
        ) {
          next.push(b);
        }
      }

      state.bullets = next;
      state.frame += 1;
    }

    function drawBackground() {
      ctx.clearRect(0, 0, state.width, state.height);

      const g = ctx.createRadialGradient(
        state.cx,
        state.cy - 80,
        20,
        state.cx,
        state.cy,
        Math.max(state.width, state.height) * 0.65
      );
      g.addColorStop(0, "rgba(58, 42, 100, 0.24)");
      g.addColorStop(0.45, "rgba(28, 20, 44, 0.15)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function drawSpawnRing() {
      const p = params();
      ctx.save();
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, p.spawnRadius, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(220, 180, 255, 0.24)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 5]);
      ctx.stroke();
      ctx.restore();
    }

    function drawBullets() {
      const p = params();

      for (const b of state.bullets) {
        const ageRatio = Math.max(0, 1 - b.age / p.lifetime);
        const alpha = 0.10 + 0.90 * ageRatio;
        const r = 2.1 + 1.7 * ageRatio;

        ctx.beginPath();
        ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(226, 184, 255, ${alpha})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(b.x, b.y, r * 0.42, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(170, 220, 255, ${Math.min(1, alpha * 0.88)})`;
        ctx.fill();
      }
    }

    function drawCenterGlow() {
      ctx.save();
      const g = ctx.createRadialGradient(state.cx, state.cy, 0, state.cx, state.cy, 42);
      g.addColorStop(0, "rgba(230, 200, 255, 0.20)");
      g.addColorStop(0.55, "rgba(180, 140, 255, 0.08)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, 42, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPlayer() {
      if (!state.playMode || !state.player.active) return;

      const now = performance.now();
      if (now < state.player.hiddenUntil) return;

      const invulnerable = now < state.player.invulnerableUntil;
      if (invulnerable && Math.floor(now / 80) % 2 === 0) return;

      ctx.save();
      ctx.beginPath();
      ctx.arc(state.player.x, state.player.y, state.player.radius + 2, 0, Math.PI * 2);
      ctx.strokeStyle = invulnerable ? "rgba(162, 224, 255, 0.88)" : "rgba(255, 216, 245, 0.95)";
      ctx.lineWidth = 1.8;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(state.player.x, state.player.y, 2.3, 0, Math.PI * 2);
      ctx.fillStyle = invulnerable ? "rgba(150, 224, 255, 0.96)" : "rgba(255, 196, 236, 0.96)";
      ctx.fill();
      ctx.restore();
    }

    function drawPlayHitFeedback() {
      if (!state.playMode) return;

      if (state.player.rippleFrames > 0) {
        const progress = 1 - state.player.rippleFrames / 16;
        const radius = state.player.radius + 8 + progress * 28;
        const alpha = 0.28 * (1 - progress);
        ctx.save();
        ctx.beginPath();
        ctx.arc(state.player.x, state.player.y, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 210, 245, ${alpha})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }

      if (state.player.flashFrames > 0) {
        const alpha = 0.16 * (state.player.flashFrames / 10);
        ctx.save();
        ctx.fillStyle = `rgba(255, 245, 255, ${alpha})`;
        ctx.fillRect(0, 0, state.width, state.height);
        ctx.restore();
      }
    }

    function render() {
      drawBackground();
      drawCenterGlow();
      drawSpawnRing();
      drawBullets();
      drawPlayer();
      drawPlayHitFeedback();

      statsEl.textContent = `${t("statsBullets")} ${state.bullets.length}`;
    }

    function loop() {
      if (!state.paused) {
        step();
      }
      updatePlayModeState();
      render();
      requestAnimationFrame(loop);
    }

    langBtn.addEventListener("click", () => {
      state.lang = state.lang === "en" ? "zh" : "en";
      document.documentElement.lang = state.lang === "en" ? "en" : "zh-CN";
      applyLanguage();
    });

    playBtn.addEventListener("click", () => {
      setPlayMode(!state.playMode);
    });

    pauseBtn.addEventListener("click", () => {
      state.paused = !state.paused;
      pauseBtn.textContent = state.paused ? t("resume") : t("pause");
    });

    resetBtn.addEventListener("click", () => {
      resetPattern();
    });

    dreamyBtn.addEventListener("click", () => {
      dreamyPreset();
    });

    calmBtn.addEventListener("click", () => {
      calmPreset();
    });

    toggleControlsBtn.addEventListener("click", () => {
      setControlsCollapsed(!state.controlsCollapsed);
    });

    Object.values(controls).forEach((input) => {
      input.addEventListener("input", () => {
        syncLabels();
        resetPattern();
      });
    });

    window.addEventListener("resize", () => {
      resize();
      resetPattern();
      if (window.innerWidth < 900 || window.innerHeight < 820) {
        setControlsCollapsed(true);
      }
    });

    canvas.addEventListener("pointerdown", onPlayPointerMove, { passive: false });
    canvas.addEventListener("pointermove", onPlayPointerMove, { passive: false });
    canvas.addEventListener("pointerleave", onPlayPointerLeave);
    canvas.addEventListener("pointerup", onPlayPointerEnd);
    canvas.addEventListener("pointercancel", onPlayPointerEnd);

    syncLabels();
    resize();
    calmPreset();
    setPlayMode(false);
    applyLanguage();

    if (window.innerWidth < 900 || window.innerHeight < 820) {
      setControlsCollapsed(true);
    }

    loop();
  </script>
</body>
</html>
