<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Boundary Between Wave and Particle</title>
  <style>
    :root {
      --bg: #0e0b14;
      --panel: rgba(26, 20, 38, 0.88);
      --panel-border: rgba(200, 170, 255, 0.18);
      --text: #f4ecff;
      --muted: #c9b7e9;
      --accent: #d8a8ff;
      --accent-2: #9ecbff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at top, #1a1330 0%, #0e0b14 45%, #09070d 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .title,
    .stats {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      pointer-events: auto;
    }

    .title {
      max-width: 62%;
    }

    .title h1 {
      margin: 0 0 4px 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .title p,
    .stats {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .stats {
      text-align: right;
      min-width: 125px;
      white-space: pre-line;
    }

    .controls {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.30);
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(180deg, rgba(220, 170, 255, 0.35), rgba(120, 90, 180, 0.35));
      color: var(--text);
      border: 1px solid rgba(220, 170, 255, 0.18);
    }

    button:active {
      transform: scale(0.985);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
    }

    .control {
      min-width: 0;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .value {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
    }

    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 520px) {
      .topbar {
        flex-direction: column;
      }

      .title {
        max-width: none;
      }

      .stats {
        text-align: left;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <div class="topbar">
      <div class="title">
        <h1>Boundary Between Wave and Particle</h1>
        <p>A mobile-friendly interactive visualization inspired by Touhou-style bullet pattern design.</p>
      </div>
      <div class="stats" id="stats"></div>
    </div>

    <div class="controls">
      <div class="button-row">
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
        <button id="presetBtn">Dreamy</button>
      </div>

      <div class="grid">
        <div class="control">
          <label><span>ways</span><span class="value" id="waysVal"></span></label>
          <input id="ways" type="range" min="1" max="12" step="1" value="5">
        </div>

        <div class="control">
          <label><span>alpha</span><span class="value" id="alphaVal"></span></label>
          <input id="alpha" type="range" min="0.0002" max="0.0080" step="0.0001" value="0.0020">
        </div>

        <div class="control">
          <label><span>emit</span><span class="value" id="emitVal"></span></label>
          <input id="emitEvery" type="range" min="1" max="8" step="1" value="2">
        </div>

        <div class="control">
          <label><span>speed</span><span class="value" id="speedVal"></span></label>
          <input id="speed" type="range" min="0.4" max="4.0" step="0.1" value="1.4">
        </div>

        <div class="control">
          <label><span>spawn</span><span class="value" id="spawnVal"></span></label>
          <input id="spawnRadius" type="range" min="10" max="80" step="1" value="24">
        </div>

        <div class="control">
          <label><span>lifetime</span><span class="value" id="lifeVal"></span></label>
          <input id="lifetime" type="range" min="80" max="420" step="5" value="220">
        </div>
      </div>

      <div class="hint">Drag the sliders and watch discrete particles become wave-like.</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const statsEl = document.getElementById("stats");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const presetBtn = document.getElementById("presetBtn");

    const controls = {
      ways: document.getElementById("ways"),
      alpha: document.getElementById("alpha"),
      emitEvery: document.getElementById("emitEvery"),
      speed: document.getElementById("speed"),
      spawnRadius: document.getElementById("spawnRadius"),
      lifetime: document.getElementById("lifetime"),
    };

    const values = {
      ways: document.getElementById("waysVal"),
      alpha: document.getElementById("alphaVal"),
      emitEvery: document.getElementById("emitVal"),
      speed: document.getElementById("speedVal"),
      spawnRadius: document.getElementById("spawnVal"),
      lifetime: document.getElementById("lifeVal"),
    };

    const state = {
      frame: 0,
      phase: 0,
      bullets: [],
      paused: false,
      dpr: Math.max(1, Math.min(window.devicePixelRatio || 1, 2)),
      width: 0,
      height: 0,
      cx: 0,
      cy: 0,
    };

    function params() {
      return {
        ways: parseInt(controls.ways.value, 10),
        alpha: parseFloat(controls.alpha.value),
        emitEvery: parseInt(controls.emitEvery.value, 10),
        speed: parseFloat(controls.speed.value),
        spawnRadius: parseFloat(controls.spawnRadius.value),
        lifetime: parseInt(controls.lifetime.value, 10),
      };
    }

    function syncLabels() {
      const p = params();
      values.ways.textContent = p.ways;
      values.alpha.textContent = p.alpha.toFixed(4);
      values.emitEvery.textContent = p.emitEvery;
      values.speed.textContent = p.speed.toFixed(1);
      values.spawnRadius.textContent = p.spawnRadius.toFixed(0);
      values.lifetime.textContent = p.lifetime;
    }

    function resize() {
      state.dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const w = window.innerWidth;
      const h = window.innerHeight;
      canvas.width = Math.floor(w * state.dpr);
      canvas.height = Math.floor(h * state.dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      state.width = w;
      state.height = h;
      state.cx = w * 0.5;
      state.cy = h * 0.46;
    }

    function resetPattern() {
      state.frame = 0;
      state.phase = 0;
      state.bullets = [];
    }

    function dreamyPreset() {
      controls.ways.value = "8";
      controls.alpha.value = "0.0032";
      controls.emitEvery.value = "1";
      controls.speed.value = "1.3";
      controls.spawnRadius.value = "28";
      controls.lifetime.value = "260";
      syncLabels();
      resetPattern();
    }

    function emitBullets() {
      const p = params();
      for (let i = 0; i < p.ways; i++) {
        const theta = state.phase + i * (Math.PI * 2 / p.ways);
        const x = state.cx + p.spawnRadius * Math.cos(theta);
        const y = state.cy + p.spawnRadius * Math.sin(theta);
        const vx = p.speed * Math.cos(theta);
        const vy = p.speed * Math.sin(theta);

        state.bullets.push({
          x,
          y,
          vx,
          vy,
          age: 0,
        });
      }
    }

    function step() {
      const p = params();

      state.phase += state.frame * p.alpha;

      if (state.frame % p.emitEvery === 0) {
        emitBullets();
      }

      const next = [];
      for (const b of state.bullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.age += 1;

        if (
          b.age <= p.lifetime &&
          b.x > -80 &&
          b.x < state.width + 80 &&
          b.y > -80 &&
          b.y < state.height + 80
        ) {
          next.push(b);
        }
      }

      state.bullets = next;
      state.frame += 1;
    }

    function drawBackground() {
      ctx.clearRect(0, 0, state.width, state.height);

      const g = ctx.createRadialGradient(
        state.cx,
        state.cy - 80,
        20,
        state.cx,
        state.cy,
        Math.max(state.width, state.height) * 0.65
      );
      g.addColorStop(0, "rgba(58, 42, 100, 0.24)");
      g.addColorStop(0.45, "rgba(28, 20, 44, 0.15)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function drawSpawnRing() {
      const p = params();
      ctx.save();
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, p.spawnRadius, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(220, 180, 255, 0.24)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 5]);
      ctx.stroke();
      ctx.restore();
    }

    function drawBullets() {
      const p = params();

      for (const b of state.bullets) {
        const t = 1 - b.age / p.lifetime;
        const alpha = 0.10 + 0.90 * Math.max(0, t);
        const r = 2.2 + 1.8 * Math.max(0, t);

        ctx.beginPath();
        ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(226, 184, 255, ${alpha})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(b.x, b.y, r * 0.45, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(170, 220, 255, ${Math.min(1, alpha * 0.9)})`;
        ctx.fill();
      }
    }

    function drawCenterGlow() {
      ctx.save();
      const g = ctx.createRadialGradient(state.cx, state.cy, 0, state.cx, state.cy, 42);
      g.addColorStop(0, "rgba(230, 200, 255, 0.20)");
      g.addColorStop(0.55, "rgba(180, 140, 255, 0.08)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, 42, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function render() {
      drawBackground();
      drawCenterGlow();
      drawSpawnRing();
      drawBullets();

      const p = params();
      const omega = state.frame * p.alpha;
      statsEl.textContent =
        `frame ${state.frame}\n` +
        `bullets ${state.bullets.length}\n` +
        `ω ${omega.toFixed(3)}`;
    }

    function loop() {
      if (!state.paused) {
        step();
      }
      render();
      requestAnimationFrame(loop);
    }

    pauseBtn.addEventListener("click", () => {
      state.paused = !state.paused;
      pauseBtn.textContent = state.paused ? "Resume" : "Pause";
    });

    resetBtn.addEventListener("click", () => {
      resetPattern();
    });

    presetBtn.addEventListener("click", () => {
      dreamyPreset();
    });

    Object.values(controls).forEach((input) => {
      input.addEventListener("input", () => {
        syncLabels();
        resetPattern();
      });
    });

    window.addEventListener("resize", () => {
      resize();
      resetPattern();
    });

    syncLabels();
    resize();
    resetPattern();
    loop();
  </script>
</body>
</html>
