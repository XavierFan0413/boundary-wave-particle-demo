<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Boundary Between Wave and Particle</title>
  <style>
    :root {
      --bg: #0e0b14;
      --panel: rgba(26, 20, 38, 0.88);
      --panel-border: rgba(200, 170, 255, 0.18);
      --text: #f4ecff;
      --muted: #c9b7e9;
      --accent: #d8a8ff;
      --accent-2: #9ecbff;
      --tooltip-bg: rgba(18, 14, 28, 0.96);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at top, #1a1330 0%, #0e0b14 45%, #09070d 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .title,
    .stats,
    .lang-wrap {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      pointer-events: auto;
    }

    .title {
      max-width: 60%;
    }

    .title h1 {
      margin: 0 0 4px 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .title p,
    .stats {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      pointer-events: auto;
    }

    .stats {
      text-align: right;
      min-width: 125px;
      white-space: pre-line;
    }

    .lang-wrap {
      padding: 8px 10px;
    }

    .lang-btn {
      border: none;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      background: linear-gradient(180deg, rgba(220, 170, 255, 0.30), rgba(120, 90, 180, 0.30));
      border: 1px solid rgba(220, 170, 255, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .controls {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 12px 14px 14px 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.30);
      transition: transform 220ms ease;
      will-change: transform;
    }

    .controls.collapsed {
      transform: translateY(calc(100% - 54px));
    }

    .controls-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 40px;
    }

    .controls-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.2px;
    }

    .controls-subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .controls-head-left {
      min-width: 0;
    }

    .controls-content {
      margin-top: 12px;
      max-height: 1000px;
      overflow: hidden;
      opacity: 1;
      transition: opacity 180ms ease, max-height 180ms ease, margin-top 180ms ease;
    }

    .controls.collapsed .controls-content {
      opacity: 0;
      max-height: 0;
      margin-top: 0;
      pointer-events: none;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(180deg, rgba(220, 170, 255, 0.35), rgba(120, 90, 180, 0.35));
      color: var(--text);
      border: 1px solid rgba(220, 170, 255, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .button-row button {
      flex: 1 1 150px;
    }

    .toggle-btn {
      flex: 0 0 auto;
      padding: 9px 12px;
      font-size: 12px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(200, 160, 255, 0.24), rgba(90, 72, 135, 0.28));
    }

    button:active {
      transform: scale(0.985);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
    }

    .control {
      min-width: 0;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .label-left {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .value {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
    }

    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .info-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .info-btn {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      padding: 0;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      font-weight: 700;
      background: rgba(170, 140, 240, 0.25);
      border: 1px solid rgba(220, 170, 255, 0.22);
      color: var(--text);
      cursor: pointer;
    }

    .tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%);
      width: min(240px, 70vw);
      padding: 8px 10px;
      border-radius: 12px;
      background: var(--tooltip-bg);
      border: 1px solid rgba(220, 170, 255, 0.18);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
      color: var(--text);
      font-size: 11px;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 40;
      text-align: left;
    }

    .info-wrap:hover .tooltip,
    .info-wrap:focus-within .tooltip {
      opacity: 1;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
      }

      .title {
        max-width: none;
      }

      .right-col {
        align-items: stretch;
      }

      .stats {
        text-align: left;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .button-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <div class="topbar">
      <div class="title">
        <h1 id="titleText">Boundary Between Wave and Particle</h1>
        <p id="subtitleText">A mobile-friendly interactive visualization inspired by Touhou-style bullet pattern design.</p>
      </div>

      <div class="right-col">
        <div class="lang-wrap">
          <button class="lang-btn" id="langBtn">中文</button>
        </div>
        <div class="stats" id="stats"></div>
      </div>
    </div>

    <div class="controls" id="controlsPanel">
      <div class="controls-header">
        <div class="controls-head-left">
          <div class="controls-title" id="controlsTitle">Controls</div>
          <div class="controls-subtitle" id="controlsSubtitle">Tweak the pattern in real time</div>
        </div>
        <button class="toggle-btn" id="toggleControlsBtn">Hide Controls</button>
      </div>

      <div class="controls-content">
        <div class="button-row">
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
          <button id="dreamyBtn">Dreamy</button>
          <button id="calmBtn">Calm</button>
        </div>

        <div class="grid">
          <div class="control">
            <label>
              <span class="label-left">
                <span id="waysLabel">ways</span>
                <span class="info-wrap">
                  <button class="info-btn" type="button">i</button>
                  <span class="tooltip" id="waysTip"></span>
                </span>
              </span>
              <span class="value" id="waysVal"></span>
            </label>
            <input id="ways" type="range" min="1" max="12" step="1" value="5">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="alphaLabel">alpha</span>
                <span class="info-wrap">
                  <button class="info-btn" type="button">i</button>
                  <span class="tooltip" id="alphaTip"></span>
                </span>
              </span>
              <span class="value" id="alphaVal"></span>
            </label>
            <input id="alpha" type="range" min="0" max="1000" step="1" value="500">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="emitLabel">emit</span>
                <span class="info-wrap">
                  <button class="info-btn" type="button">i</button>
                  <span class="tooltip" id="emitTip"></span>
                </span>
              </span>
              <span class="value" id="emitVal"></span>
            </label>
            <input id="emitEvery" type="range" min="1" max="8" step="1" value="2">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="bulletSpeedLabel">bullet speed</span>
                <span class="info-wrap">
                  <button class="info-btn" type="button">i</button>
                  <span class="tooltip" id="bulletSpeedTip"></span>
                </span>
              </span>
              <span class="value" id="bulletSpeedVal"></span>
            </label>
            <input id="bulletSpeed" type="range" min="0.05" max="2.50" step="0.01" value="0.75">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="spawnLabel">spawn</span>
                <span class="info-wrap">
                  <button class="info-btn" type="button">i</button>
                  <span class="tooltip" id="spawnTip"></span>
                </span>
              </span>
              <span class="value" id="spawnVal"></span>
            </label>
            <input id="spawnRadius" type="range" min="10" max="80" step="1" value="24">
          </div>

          <div class="control">
            <label>
              <span class="label-left">
                <span id="lifetimeLabel">lifetime</span>
                <span class="info-wrap">
                  <button class="info-btn" type="button">i</button>
                  <span class="tooltip" id="lifetimeTip"></span>
                </span>
              </span>
              <span class="value" id="lifetimeVal"></span>
            </label>
            <input id="lifetime" type="range" min="80" max="420" step="5" value="220">
          </div>
        </div>

        <div class="hint" id="hintText">Drag the sliders and watch discrete particles become wave-like.</div>
      </div>
    </div>
  </div>

  <script>
    const I18N = {
      en: {
        title: "Boundary Between Wave and Particle",
        subtitle: "A mobile-friendly interactive visualization inspired by Touhou-style bullet pattern design.",
        controlsTitle: "Controls",
        controlsSubtitle: "Tweak the pattern in real time",
        hideControls: "Hide Controls",
        showControls: "Show Controls",
        pause: "Pause",
        resume: "Resume",
        reset: "Reset",
        dreamy: "Dreamy",
        calm: "Calm",
        hint: "Drag the sliders and watch discrete particles become wave-like.",
        ways: "ways",
        alpha: "alpha",
        emit: "emit",
        bulletSpeed: "bullet speed",
        spawn: "spawn",
        lifetime: "lifetime",
        statsFrame: "frame",
        statsBullets: "bullets",
        waysTip: "How many arms or streams are emitted at the same time. More ways usually make the pattern fuller.",
        alphaTip: "How quickly the emission angle accelerates. Lower values feel calmer and more open. Higher values twist faster.",
        emitTip: "How many frames between emissions. Lower values make the pattern denser.",
        bulletSpeedTip: "How fast each bullet moves outward. Lower values make the motion gentler and easier to observe.",
        spawnTip: "The radius of the emission ring around the center.",
        lifetimeTip: "How long bullets stay on screen before disappearing.",
        langButton: "中文"
      },
      zh: {
        title: "波与粒的境界",
        subtitle: "一个适合手机浏览器操作的互动可视化，用来表现类似东方弹幕里那种由离散粒子形成波纹错觉的感觉。",
        controlsTitle: "控制面板",
        controlsSubtitle: "实时调整参数并观察图样变化",
        hideControls: "收起面板",
        showControls: "展开面板",
        pause: "暂停",
        resume: "继续",
        reset: "重置",
        dreamy: "梦幻",
        calm: "平缓",
        hint: "拖动下面的滑条，看看离散粒子怎样慢慢长成像波一样的图案。",
        ways: "分支数",
        alpha: "alpha",
        emit: "发射间隔",
        bulletSpeed: "子弹速度",
        spawn: "发射半径",
        lifetime: "存活时间",
        statsFrame: "帧数",
        statsBullets: "弹数",
        waysTip: "同时向外发射的臂数或流数。数值越大，整体看起来通常越饱满。",
        alphaTip: "控制发射角度加速扭转的强度。越低越平缓、越松，越高越容易快速扭起来。",
        emitTip: "每隔多少帧发射一次。数值越低，图案越密。",
        bulletSpeedTip: "每颗子弹向外移动的速度。数值越低，运动更柔和，也更容易观察。",
        spawnTip: "中心附近那一圈发射环的半径。",
        lifetimeTip: "子弹会在画面上保留多久，超过这个时间就消失。",
        langButton: "EN"
      }
    };

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const titleText = document.getElementById("titleText");
    const subtitleText = document.getElementById("subtitleText");
    const controlsTitle = document.getElementById("controlsTitle");
    const controlsSubtitle = document.getElementById("controlsSubtitle");
    const statsEl = document.getElementById("stats");
    const hintText = document.getElementById("hintText");

    const langBtn = document.getElementById("langBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const dreamyBtn = document.getElementById("dreamyBtn");
    const calmBtn = document.getElementById("calmBtn");
    const controlsPanel = document.getElementById("controlsPanel");
    const toggleControlsBtn = document.getElementById("toggleControlsBtn");

    const controls = {
      ways: document.getElementById("ways"),
      alpha: document.getElementById("alpha"),
      emitEvery: document.getElementById("emitEvery"),
      bulletSpeed: document.getElementById("bulletSpeed"),
      spawnRadius: document.getElementById("spawnRadius"),
      lifetime: document.getElementById("lifetime"),
    };

    const values = {
      ways: document.getElementById("waysVal"),
      alpha: document.getElementById("alphaVal"),
      emitEvery: document.getElementById("emitVal"),
      bulletSpeed: document.getElementById("bulletSpeedVal"),
      spawnRadius: document.getElementById("spawnVal"),
      lifetime: document.getElementById("lifetimeVal"),
    };

    const labels = {
      ways: document.getElementById("waysLabel"),
      alpha: document.getElementById("alphaLabel"),
      emitEvery: document.getElementById("emitLabel"),
      bulletSpeed: document.getElementById("bulletSpeedLabel"),
      spawnRadius: document.getElementById("spawnLabel"),
      lifetime: document.getElementById("lifetimeLabel"),
    };

    const tips = {
      ways: document.getElementById("waysTip"),
      alpha: document.getElementById("alphaTip"),
      emitEvery: document.getElementById("emitTip"),
      bulletSpeed: document.getElementById("bulletSpeedTip"),
      spawnRadius: document.getElementById("spawnTip"),
      lifetime: document.getElementById("lifetimeTip"),
    };

    const ALPHA_MIN = 0.0000002;
    const ALPHA_MAX = 0.0045000;

    const state = {
      frame: 0,
      phase: 0,
      bullets: [],
      paused: false,
      dpr: Math.max(1, Math.min(window.devicePixelRatio || 1, 2)),
      width: 0,
      height: 0,
      cx: 0,
      cy: 0,
      controlsCollapsed: false,
      lang: "en"
    };

    function t(key) {
      return I18N[state.lang][key];
    }

    function alphaFromSlider(raw) {
      const x = Number(raw) / 1000;
      return ALPHA_MIN + (ALPHA_MAX - ALPHA_MIN) * Math.pow(x, 3);
    }

    function sliderFromAlpha(alpha) {
      const clamped = Math.max(ALPHA_MIN, Math.min(ALPHA_MAX, alpha));
      const x = Math.pow((clamped - ALPHA_MIN) / (ALPHA_MAX - ALPHA_MIN), 1 / 3);
      return Math.round(x * 1000);
    }

    function formatAlpha(v) {
      if (v < 0.00001) return v.toFixed(7);
      return v.toFixed(6);
    }

    function params() {
      return {
        ways: parseInt(controls.ways.value, 10),
        alpha: alphaFromSlider(controls.alpha.value),
        emitEvery: parseInt(controls.emitEvery.value, 10),
        bulletSpeed: parseFloat(controls.bulletSpeed.value),
        spawnRadius: parseFloat(controls.spawnRadius.value),
        lifetime: parseInt(controls.lifetime.value, 10),
      };
    }

    function syncLabels() {
      const p = params();
      values.ways.textContent = p.ways;
      values.alpha.textContent = formatAlpha(p.alpha);
      values.emitEvery.textContent = p.emitEvery;
      values.bulletSpeed.textContent = p.bulletSpeed.toFixed(2);
      values.spawnRadius.textContent = p.spawnRadius.toFixed(0);
      values.lifetime.textContent = p.lifetime;
    }

    function applyLanguage() {
      titleText.textContent = t("title");
      subtitleText.textContent = t("subtitle");
      controlsTitle.textContent = t("controlsTitle");
      controlsSubtitle.textContent = t("controlsSubtitle");
      pauseBtn.textContent = state.paused ? t("resume") : t("pause");
      resetBtn.textContent = t("reset");
      dreamyBtn.textContent = t("dreamy");
      calmBtn.textContent = t("calm");
      hintText.textContent = t("hint");
      toggleControlsBtn.textContent = state.controlsCollapsed ? t("showControls") : t("hideControls");
      langBtn.textContent = t("langButton");

      labels.ways.textContent = t("ways");
      labels.alpha.textContent = t("alpha");
      labels.emitEvery.textContent = t("emit");
      labels.bulletSpeed.textContent = t("bulletSpeed");
      labels.spawnRadius.textContent = t("spawn");
      labels.lifetime.textContent = t("lifetime");

      tips.ways.textContent = t("waysTip");
      tips.alpha.textContent = t("alphaTip");
      tips.emitEvery.textContent = t("emitTip");
      tips.bulletSpeed.textContent = t("bulletSpeedTip");
      tips.spawnRadius.textContent = t("spawnTip");
      tips.lifetime.textContent = t("lifetimeTip");
    }

    function resize() {
      state.dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const w = window.innerWidth;
      const h = window.innerHeight;

      canvas.width = Math.floor(w * state.dpr);
      canvas.height = Math.floor(h * state.dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";

      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

      state.width = w;
      state.height = h;
      state.cx = w * 0.5;
      state.cy = h * 0.44;
    }

    function resetPattern() {
      state.frame = 0;
      state.phase = 0;
      state.bullets = [];
    }

    function setControlsCollapsed(collapsed) {
      state.controlsCollapsed = collapsed;
      controlsPanel.classList.toggle("collapsed", collapsed);
      toggleControlsBtn.textContent = collapsed ? t("showControls") : t("hideControls");
    }

    function dreamyPreset() {
      controls.ways.value = "8";
      controls.alpha.value = String(sliderFromAlpha(0.0032));
      controls.emitEvery.value = "1";
      controls.bulletSpeed.value = "0.70";
      controls.spawnRadius.value = "28";
      controls.lifetime.value = "260";
      syncLabels();
      resetPattern();
    }

    function calmPreset() {
      controls.ways.value = "5";
      controls.alpha.value = String(sliderFromAlpha(0.000030));
      controls.emitEvery.value = "2";
      controls.bulletSpeed.value = "0.38";
      controls.spawnRadius.value = "24";
      controls.lifetime.value = "240";
      syncLabels();
      resetPattern();
    }

    function emitBullets() {
      const p = params();
      for (let i = 0; i < p.ways; i++) {
        const theta = state.phase + i * (Math.PI * 2 / p.ways);
        const x = state.cx + p.spawnRadius * Math.cos(theta);
        const y = state.cy + p.spawnRadius * Math.sin(theta);
        const vx = p.bulletSpeed * Math.cos(theta);
        const vy = p.bulletSpeed * Math.sin(theta);

        state.bullets.push({
          x,
          y,
          vx,
          vy,
          age: 0,
        });
      }
    }

    function step() {
      const p = params();

      state.phase += state.frame * p.alpha;

      if (state.frame % p.emitEvery === 0) {
        emitBullets();
      }

      const next = [];
      for (const b of state.bullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.age += 1;

        if (
          b.age <= p.lifetime &&
          b.x > -80 &&
          b.x < state.width + 80 &&
          b.y > -80 &&
          b.y < state.height + 80
        ) {
          next.push(b);
        }
      }

      state.bullets = next;
      state.frame += 1;
    }

    function drawBackground() {
      ctx.clearRect(0, 0, state.width, state.height);

      const g = ctx.createRadialGradient(
        state.cx,
        state.cy - 80,
        20,
        state.cx,
        state.cy,
        Math.max(state.width, state.height) * 0.65
      );
      g.addColorStop(0, "rgba(58, 42, 100, 0.24)");
      g.addColorStop(0.45, "rgba(28, 20, 44, 0.15)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function drawSpawnRing() {
      const p = params();
      ctx.save();
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, p.spawnRadius, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(220, 180, 255, 0.24)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 5]);
      ctx.stroke();
      ctx.restore();
    }

    function drawBullets() {
      const p = params();

      for (const b of state.bullets) {
        const ageRatio = Math.max(0, 1 - b.age / p.lifetime);
        const alpha = 0.10 + 0.90 * ageRatio;
        const r = 2.1 + 1.7 * ageRatio;

        ctx.beginPath();
        ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(226, 184, 255, ${alpha})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(b.x, b.y, r * 0.42, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(170, 220, 255, ${Math.min(1, alpha * 0.88)})`;
        ctx.fill();
      }
    }

    function drawCenterGlow() {
      ctx.save();
      const g = ctx.createRadialGradient(state.cx, state.cy, 0, state.cx, state.cy, 42);
      g.addColorStop(0, "rgba(230, 200, 255, 0.20)");
      g.addColorStop(0.55, "rgba(180, 140, 255, 0.08)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, 42, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function render() {
      drawBackground();
      drawCenterGlow();
      drawSpawnRing();
      drawBullets();

      const p = params();
      const omega = state.frame * p.alpha;
      statsEl.textContent =
        `${t("statsFrame")} ${state.frame}\n` +
        `${t("statsBullets")} ${state.bullets.length}\n` +
        `ω ${omega.toFixed(3)}`;
    }

    function loop() {
      if (!state.paused) {
        step();
      }
      render();
      requestAnimationFrame(loop);
    }

    langBtn.addEventListener("click", () => {
      state.lang = state.lang === "en" ? "zh" : "en";
      document.documentElement.lang = state.lang === "en" ? "en" : "zh-CN";
      applyLanguage();
    });

    pauseBtn.addEventListener("click", () => {
      state.paused = !state.paused;
      pauseBtn.textContent = state.paused ? t("resume") : t("pause");
    });

    resetBtn.addEventListener("click", () => {
      resetPattern();
    });

    dreamyBtn.addEventListener("click", () => {
      dreamyPreset();
    });

    calmBtn.addEventListener("click", () => {
      calmPreset();
    });

    toggleControlsBtn.addEventListener("click", () => {
      setControlsCollapsed(!state.controlsCollapsed);
    });

    Object.values(controls).forEach((input) => {
      input.addEventListener("input", () => {
        syncLabels();
        resetPattern();
      });
    });

    window.addEventListener("resize", () => {
      resize();
      resetPattern();
      if (window.innerWidth < 900 || window.innerHeight < 820) {
        setControlsCollapsed(true);
      }
    });

    document.querySelectorAll(".info-btn").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        const wrap = btn.parentElement;
        const active = wrap.matches(":focus-within");
        if (!active) btn.focus();
      });
    });

    syncLabels();
    resize();
    calmPreset();
    applyLanguage();

    if (window.innerWidth < 900 || window.innerHeight < 820) {
      setControlsCollapsed(true);
    }

    loop();
  </script>
</body>
</html>
